<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Ripple</title>
<style>
body {
  /* 白背景にしたいならこれを有効化 */
  /* background: #fff; */

  margin: 0;
  height: 100vh;
  display: grid;
  place-items: center;
}

/* 波紋コンテナ */
.ripple {
  position: relative;
  width: 120px;
  height: 120px;
}

/* 波紋そのもの */
.ripple::before,
.ripple::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 2px solid #4fc3f7;
  opacity: 0;
  animation: ripple 2s infinite;
}

.ripple::after {
  animation-delay: 1s;
}

@keyframes ripple {
  0% {
    transform: scale(0.2);
    opacity: 0.8;
    background: #00e34b;
  }
  100% {
    transform: scale(2.5);
    opacity: 0;
  }
}
  
</style>
</head>
