<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Ripple</title>
<style>
body {
  /* 白背景にしたいならこれを有効化 */
  /* background: #fff; */

  margin: 0;
  height: 100vh;
  display: grid;
  place-items: center;
}

/* 波紋コンテナ */
.ripple {
  position: relative;
  width: 120px;
  height: 120px;
}

/* 波紋そのもの */
.ripple::before,
.ripple::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 2px solid #4fc3f7;
  opacity: 0;
  animation: ripple 2s infinite;
}

.ripple::after {
  animation-delay: 1s;
}

@keyframes ripple {
  0% {
    transform: scale(0.2);
    opacity: 0.8;
  }
  100% {
    transform: scale(2.5);
    opacity: 0;
  }
}

.controls {
  position: relative;
  z-index: 1;
}

button {
  margin: 5px;
  padding: 10px 16px;
  border: none;
  cursor: pointer;
  background: #eee;
  border-radius: 6px;
}
  
</style>
</head>
<body>

<div class="ripple"></div>
  
<div class="controls">
  <button onclick="setColor('#4fc3f7')">青</button>
  <button onclick="setColor('#ff6b6b')">赤</button>
  <button onclick="setColor('#51cf66')">緑</button>
  <button onclick="setColor('#ffd43b')">黄</button>
</div>
  
<a href="./index.html">前のページに戻る</a>
  
</body>
  <script>
function setColor(color) {
  document.documentElement.style.setProperty('--ripple-color', color);
}
　</script>
</html>
